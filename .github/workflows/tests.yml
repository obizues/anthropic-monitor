name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Type check
        run: mypy src/
      - name: Run tests
        env:
          ANTHROPIC_API_KEY: test-key
          UNSUBSCRIBE_SECRET: test-secret-32-chars-minimum-here
          CONFIG_API_KEY: test-api-key
        run: pytest
