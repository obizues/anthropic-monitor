name: Run Monitor

on:
  schedule:
    # Every 2 hours, 24/7 — business hours logic is handled in code
    - cron: "0 */2 * * *"
  workflow_dispatch:  # Allow manual runs from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: |
            state/
            queue/
          key: monitor-state-${{ github.run_number }}
          restore-keys: monitor-state-

      - name: Run monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_ADDRESS: "Anthropic Monitor <onboarding@resend.dev>"
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          CONFIG_API_KEY: ${{ secrets.CONFIG_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: python -m monitor.scheduler

  flush-queue:
    runs-on: ubuntu-latest
    # Flush queued posts at 9am EST (13:00 UTC) on weekdays
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Restore state
        uses: actions/cache@v4
        with:
          path: |
            state/
            queue/
          key: monitor-state-${{ github.run_number }}
          restore-keys: monitor-state-
      - name: Flush digest queue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_ADDRESS: "Anthropic Monitor <onboarding@resend.dev>"
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          CONFIG_API_KEY: ${{ secrets.CONFIG_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: python -c "import asyncio; from monitor.scheduler import flush_queue; asyncio.run(flush_queue())"
